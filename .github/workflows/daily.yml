name: Morning Money Daily Digest

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic python-dotenv feedparser requests

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 main.py

      - name: Commit state files
        run: |
          git config user.name "Morning Money Bot"
          git config user.email "actions@github.com"
          git add -f seen_urls.json seen_topics.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update state files [skip ci]"
            git push
          fi
